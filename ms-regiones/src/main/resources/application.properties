server.port=8086
spring.application.name=ms-regiones

# Base de datos propia de ms-regiones
spring.datasource.url=jdbc:mysql://localhost:3306/regiones_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT
jwt.secret=RealmOfValyronSecretKeyParaJWT2024$$$

# Deshabilitar verificador de compatibilidad
spring.cloud.compatibility-verifier.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.version=openapi_3_0
spring.main.web-application-type=servlet