server.port=8083
spring.application.name=ms-poderes

# Base de datos propia de ms-poderes
spring.datasource.url=jdbc:mysql://localhost:3306/poderes_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Compatibilidad Spring Cloud
spring.cloud.compatibility-verifier.enabled=false
