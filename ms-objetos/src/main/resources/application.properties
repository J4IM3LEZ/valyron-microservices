server.port=8083
spring.application.name=ms-objetos

# Base de datos propia de ms-objetos
spring.datasource.url=jdbc:mysql://localhost:3306/objetos_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Deshabilitar verificador de compatibilidad
spring.cloud.compatibility-verifier.enabled=false

# JWT secret (debe ser igual al de ms-auth)
jwt.secret=RealmOfValyronSecretKeyParaJWT2024$$$